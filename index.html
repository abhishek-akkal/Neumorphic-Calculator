<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="Logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dark">
    <nav>
        <div class="left">
            <a href="https://x.com/AkkalAbhishek" target="_blank"><img src="Logo.png" class="logo"></a>

            <div class="text">

                <div class="top">
                    <span class="name"><a href="https://www.linkedin.com/in/abhishek-akkal-0a0ab62b2/"
                            target="_blank">Abhishek</a></span>
                    <button class="follow"><a href="https://www.instagram.com/akkalabhishek_0028"
                            target="_blank">+Follow</a></button>
                </div>

                <span class="title">Calculator</span>
            </div>
        </div>
        <div class="right">
            <button class="heart">
                <i id="heartIcon" class="fa-regular fa-heart"></i>
                <span id="count">0</span>
            </button>
            <button class="code"><a href="https://github.com/abhishek-akkal/Neumorphic-Calculator/tree/main"
                    target="_blank">View SourceCode</a></button>
            <button class="sign-up">Sign Up</button>
            <button class="log-in">Log In</button>
        </div>
    </nav>

    <main>
        <div class="wrapped">

            <div class="Calculator">
                <div class="toggle">
                    <div class="circle">
                        <span id="icon">🌙</span>
                    </div>
                </div>
                <div class="display">
                    <span id="output">0</span>
                </div>

                <div class="buttons">
                    <button class="ac">AC</button>
                    <button class="percent">%</button>
                    <button class="div">&divide;</button>
                    <button class="mul">&#215;</button>
                    <button class="sub">-</button>

                    <button class="seven">7</button>
                    <button class="eight">8</button>
                    <button class="nine">9</button>
                    <button class="plus">+</button>

                    <button class="four">4</button>
                    <button class="five">5</button>
                    <button class="six">6</button>

                    <button class="one">1</button>
                    <button class="two">2</button>
                    <button class="three">3</button>

                    <button class="zero">0</button>
                    <button class="dot">.</button>
                    <button class="equal">=</button>
                </div>
            </div>
        </div>
    </main>



    <script src="app.js"></script>
</body>

</html>
